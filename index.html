<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中国象棋 · 对弈 Fairy-Stockfish NNUE</title>
<style>
  :root {
    --bg: #211a13;
    --panel: #2b2218;
    --panel-edge: #3d3122;
    --ink: #f0e6d6;
    --muted: #a08d72;
    --accent: #c0392b;
    --wood-hi: #d8a95f;
    --wood-lo: #c08a45;
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(900px 500px at 50% -10%, #2c2318 0%, var(--bg) 65%);
    color: var(--ink);
    font-family: "Songti SC", "Noto Serif SC", "SimSun", serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 22px 16px 30px;
  }
  header { text-align: center; margin-bottom: 18px; }
  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    letter-spacing: 0.4em;
    margin-left: 0.4em;
  }
  h1 .dot { color: var(--accent); }
  .tagline {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.28em;
    margin-top: 8px;
  }
  .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
  }
  .boardcard {
    background: linear-gradient(135deg, var(--wood-hi), var(--wood-lo));
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  canvas#board {
    display: block;
    width: min(520px, 92vw);
    height: auto;
    cursor: pointer;
    border-radius: 4px;
  }
  aside {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 8px;
    padding: 20px;
    width: 250px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    font-family: ui-sans-serif, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--muted);
    margin-bottom: 7px;
  }
  .status {
    font-size: 16px;
    font-weight: 600;
    min-height: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status .pulse {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.1s ease-in-out infinite;
    flex: none;
  }
  @keyframes pulse { 50% { opacity: 0.25; } }
  @media (prefers-reduced-motion: reduce) { .status .pulse { animation: none; } }
  select, button, textarea {
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    background: #241d14;
    border: 1px solid var(--panel-edge);
    border-radius: 5px;
    padding: 8px 12px;
    width: 100%;
    cursor: pointer;
  }
  select:hover, button:hover { border-color: var(--muted); }
  textarea {
    cursor: text;
    resize: vertical;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  textarea:focus-visible { outline: 2px solid var(--wood-hi); outline-offset: 2px; }
  .palette { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
  .palette button {
    width: 32px; height: 32px; padding: 0; flex: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #faf0da, #e3cda3);
    border-color: #8a6d43;
    font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
    font-size: 17px; font-weight: 700; line-height: 1;
  }
  .palette button.rd { color: #b03426; }
  .palette button.blk { color: #33291c; }
  .palette button.erase {
    background: #241d14; color: var(--muted);
    border-color: var(--panel-edge);
    font-family: inherit; font-size: 12px;
  }
  .palette button.sel { outline: 2px solid #2e7d4f; outline-offset: 2px; }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #d24435; }
  button:disabled { opacity: 0.45; cursor: default; }
  button:focus-visible, select:focus-visible { outline: 2px solid var(--wood-hi); outline-offset: 2px; }
  .row2 { display: flex; gap: 10px; }
  .movelist {
    height: 110px;
    overflow-y: auto;
    background: #241d14;
    border: 1px solid var(--panel-edge);
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 12px;
    line-height: 1.9;
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .movelist b { color: var(--ink); font-weight: 600; }
  .engine-info {
    border-top: 1px solid var(--panel-edge);
    padding-top: 11px;
    font-size: 11px;
    line-height: 1.7;
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    word-break: break-all;
  }
  .engine-info .ename { color: var(--wood-hi); font-weight: 700; }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20, 15, 9, 0.82);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay .card {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 10px;
    padding: 36px 48px;
    text-align: center;
    max-width: 380px;
  }
  .overlay .big {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.3em;
    margin: 0 0 12px 0.3em;
  }
  .overlay .sub {
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 24px;
    font-family: ui-sans-serif, system-ui, "PingFang SC", sans-serif;
  }
  .overlay .card.import {
    text-align: left;
    width: min(460px, 94vw);
    max-width: none;
    padding: 28px 30px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-family: ui-sans-serif, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .card.import .big { text-align: center; margin-bottom: 0; }
  .err {
    color: #e07b6d;
    font-size: 12px;
    min-height: 16px;
    line-height: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>中国象棋<span class="dot">・</span>NNUE</h1>
  <div class="tagline">对弈 Fairy-Stockfish 神经网络引擎</div>
</header>

<div class="layout">
  <div class="boardcard">
    <canvas id="board" width="520" height="576"></canvas>
  </div>
  <aside>
    <div>
      <div class="label">对局状态</div>
      <div class="status" id="status"><span class="pulse"></span>正在加载引擎与模型…</div>
    </div>
    <div id="playPanel" style="display:contents">
      <div>
        <div class="label">执子</div>
        <select id="side">
          <option value="r" selected>我执红（先手）</option>
          <option value="b">我执黑（后手）</option>
        </select>
      </div>
      <div>
        <div class="label">难度</div>
        <select id="level">
          <option value="easy">初学 · 走子快且常出漏着</option>
          <option value="medium" selected>业余 · 有一定攻防</option>
          <option value="hard">高手 · 全力 1 秒</option>
          <option value="master">大师 · 全力 5 秒</option>
        </select>
      </div>
      <div class="row2">
        <button id="undoBtn" type="button" disabled>悔棋</button>
        <button id="restartBtn" class="primary" type="button">重新开始</button>
      </div>
      <div class="row2">
        <button id="importBtn" type="button">导入局面</button>
        <button id="setupBtn" type="button">摆棋</button>
      </div>
    </div>
    <div id="setupPanel" style="display:none; flex-direction:column; gap:15px;">
      <div>
        <div class="label">选子后点击棋盘放置 · 再点同点移除</div>
        <div class="palette" id="paletteRed"></div>
        <div class="palette" id="paletteBlack"></div>
      </div>
      <div>
        <div class="label">轮走方</div>
        <select id="setupTurn">
          <option value="w" selected>红方先走</option>
          <option value="b">黑方先走</option>
        </select>
      </div>
      <div class="row2">
        <button id="setupClearBtn" type="button">清空</button>
        <button id="setupInitBtn" type="button">初始局面</button>
      </div>
      <div class="err" id="setupErr"></div>
      <div class="row2">
        <button id="setupCancelBtn" type="button">取消</button>
        <button id="setupDoneBtn" class="primary" type="button">生成 FEN</button>
      </div>
    </div>
    <div>
      <div class="label">着法（WXF 记谱）</div>
      <div class="movelist" id="movelist">—</div>
    </div>
    <div class="engine-info">
      <div class="ename" id="engineName">Fairy-Stockfish WASM</div>
      <div id="engineMsg">NNUE: xiangqi-c07e94a5c7cb（+914 Elo）</div>
    </div>
  </aside>
</div>

<div class="overlay hidden" id="importOverlay">
  <div class="card import">
    <p class="big">导入局面</p>
    <div>
      <div class="label">FEN 串（第二段 w＝红方走，b＝黑方走）</div>
      <textarea id="fenInput" rows="3" spellcheck="false"
        placeholder="例：rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w - - 0 1"></textarea>
    </div>
    <div>
      <div class="label">先行方（FEN 中轮走的一方由谁执）</div>
      <select id="firstSel">
        <option value="human" selected>我先行</option>
        <option value="ai">引擎先行 · AI 解题</option>
      </select>
    </div>
    <div class="err" id="fenErr"></div>
    <div class="row2">
      <button id="importCancelBtn" type="button">取消</button>
      <button id="importOkBtn" class="primary" type="button">导入并开始</button>
    </div>
    <button id="resetStdBtn" type="button">恢复标准开局</button>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="card">
    <p class="big" id="overlayTitle"></p>
    <p class="sub" id="overlaySub"></p>
    <button class="primary" id="againBtn" type="button">再来一局</button>
  </div>
</div>

<script src="coi-serviceworker.min.js"></script>
<script src="lib/stockfish.js"></script>
<script type="module">
import Module from "./lib/ffish.js";

(async () => {
  "use strict";

  const statusEl = document.getElementById("status");
  const engineNameEl = document.getElementById("engineName");
  const engineMsgEl = document.getElementById("engineMsg");
  const movelistEl = document.getElementById("movelist");
  const undoBtn = document.getElementById("undoBtn");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlaySub = document.getElementById("overlaySub");

  function setStatus(text, busy) {
    statusEl.innerHTML = busy ? '<span class="pulse"></span>' + text : text;
  }

  if (!window.crossOriginIsolated) {
    // 线上部署时 coi-serviceworker 注册后会自动刷新一次进入隔离状态
    setStatus("正在启用跨源隔离…", true);
    engineMsgEl.textContent =
      "若长时间停留此状态：本地请通过 python3 serve.py 访问；" +
      "线上请确认浏览器支持 Service Worker（需 HTTPS）。";
    return;
  }

  // ---------- 加载规则库与引擎 ----------
  // ES6 导入时 document.currentScript 为 null，必须显式告知 wasm 路径
  const ffish = await Module({ locateFile: (f) => "lib/" + f });
  const Notation = ffish.Notation;

  const sf = await Stockfish();
  let onBestmove = null;
  let lastInfo = "";
  let staleBestmoves = 0; // 弃置的旧搜索数：其 bestmove 到达时按序丢弃
  sf.addMessageListener((line) => {
    if (line.startsWith("info ") && line.includes(" pv ")) lastInfo = line;
    const m = /^bestmove (\S+)/.exec(line);
    if (!m) return;
    if (staleBestmoves > 0) { staleBestmoves--; return; }
    if (onBestmove) { const cb = onBestmove; onBestmove = null; cb(m[1]); }
  });

  setStatus("正在加载 NNUE 模型…", true);
  const nnueResp = await fetch("lib/xiangqi.nnue");
  const nnueData = new Uint8Array(await nnueResp.arrayBuffer());
  sf.FS.writeFile("/xiangqi.nnue", nnueData);
  sf.postMessage("uci");
  sf.postMessage("setoption name UCI_Variant value xiangqi");
  sf.postMessage("setoption name EvalFile value /xiangqi.nnue");
  sf.postMessage("setoption name Use NNUE value true");
  sf.postMessage("setoption name Hash value 64");

  // ---------- 对局状态 ----------
  const LEVELS = {
    easy:   { skill: -8, movetime: 300 },
    medium: { skill: 4,  movetime: 500 },
    hard:   { skill: 20, movetime: 1000 },
    master: { skill: 20, movetime: 5000 }
  };
  const CHARS = {
    K: "帥", A: "仕", B: "相", N: "傌", R: "俥", C: "炮", P: "兵",
    k: "將", a: "士", b: "象", n: "馬", r: "車", c: "砲", p: "卒"
  };

  let board = new ffish.Board("xiangqi");
  let startFen = null;  // 导入的起始局面；null 表示标准开局
  let moves = [];       // UCI 着法
  let sans = [];        // WXF 记谱
  let humanRed = true;  // 人执红？
  let flipped = false;  // 黑方视角
  let selected = null;  // 选中的起点格 "b3"
  let targets = [];     // 选中子的合法落点
  let lastMove = null;  // {from, to}
  let gameOver = false;
  let endTitle = "";    // 终局时的状态标题，摆棋取消后用于恢复
  let thinking = false;
  let setupMode = false;
  let setupGrid = {};   // 摆棋模式下的盘面 {sq: letter}
  let setupSel = "K";   // 调色板当前选中：棋子字母或 "x"（移除）

  const humanTurn = () => board.turn() === humanRed;

  // ---------- 棋盘渲染 ----------
  const canvas = document.getElementById("board");
  const W = 520, H = 576, GAP = 54;
  const MX = (W - GAP * 8) / 2, MY = (H - GAP * 9) / 2;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  // 格子名 "a1".."i10"；file 0-8, rank 1-10
  const sqName = (f, r) => "abcdefghi"[f] + r;
  const px = (f) => MX + (flipped ? 8 - f : f) * GAP;
  const py = (r) => MY + (flipped ? r - 1 : 10 - r) * GAP;

  function parseSq(s) {
    return { f: s.charCodeAt(0) - 97, r: parseInt(s.slice(1), 10) };
  }

  function gridFromFen(fen) {
    const grid = {};
    const rows = fen.split(" ")[0].split("/");
    for (let i = 0; i < 10; i++) {
      const rank = 10 - i;
      let f = 0;
      for (const ch of rows[i]) {
        if (ch >= "1" && ch <= "9") f += parseInt(ch, 10);
        else grid[sqName(f++, rank)] = ch;
      }
    }
    return grid;
  }

  function line(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1 + 0.5, y1 + 0.5);
    ctx.lineTo(x2 + 0.5, y2 + 0.5);
    ctx.stroke();
  }

  function drawBoardBase() {
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, "#dcae66");
    g.addColorStop(1, "#c48c46");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = "rgba(74, 50, 22, 0.8)";
    ctx.lineWidth = 1;
    const L = MX, R2 = MX + GAP * 8, T = MY, B2 = MY + GAP * 9;
    const yTop5 = MY + GAP * 4, yBot6 = MY + GAP * 5; // 河界两岸

    // 横线 10 条
    for (let i = 0; i <= 9; i++) line(L, MY + i * GAP, R2, MY + i * GAP);
    // 纵线：两边全长，中间的被河界截断
    for (let i = 0; i <= 8; i++) {
      const x = MX + i * GAP;
      if (i === 0 || i === 8) line(x, T, x, B2);
      else { line(x, T, x, yTop5); line(x, yBot6, x, B2); }
    }
    // 外框加重
    ctx.lineWidth = 2;
    ctx.strokeRect(L - 4.5, T - 4.5, GAP * 8 + 9, GAP * 9 + 9);
    ctx.lineWidth = 1;

    // 九宫斜线（上下各一）
    line(MX + GAP * 3, T, MX + GAP * 5, T + GAP * 2);
    line(MX + GAP * 5, T, MX + GAP * 3, T + GAP * 2);
    line(MX + GAP * 3, B2, MX + GAP * 5, B2 - GAP * 2);
    line(MX + GAP * 5, B2, MX + GAP * 3, B2 - GAP * 2);

    // 炮位、兵卒位角标
    const mark = (f, r) => {
      const x = MX + f * GAP, y = MY + (10 - r) * GAP, d = 4, m = 8;
      ctx.beginPath();
      for (const [sx, sy] of [[-1, -1], [1, -1], [-1, 1], [1, 1]]) {
        if ((f === 0 && sx < 0) || (f === 8 && sx > 0)) continue;
        ctx.moveTo(x + sx * d, y + sy * (d + m) - sy * m + sy * m); // 角标竖段
        ctx.moveTo(x + sx * d, y + sy * (d + m));
        ctx.lineTo(x + sx * d, y + sy * d);
        ctx.lineTo(x + sx * (d + m), y + sy * d);
      }
      ctx.stroke();
    };
    for (const [f, r] of [[1, 3], [7, 3], [1, 8], [7, 8]]) mark(f, r);
    for (const f of [0, 2, 4, 6, 8]) { mark(f, 4); mark(f, 7); }

    // 楚河汉界
    ctx.fillStyle = "rgba(74, 50, 22, 0.65)";
    ctx.font = '600 26px "Kaiti SC", "STKaiti", "KaiTi", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const midY = (yTop5 + yBot6) / 2;
    ctx.fillText("楚 河", MX + GAP * 2, midY);
    ctx.fillText("漢 界", MX + GAP * 6, midY);
  }

  function drawPiece(sq, letter, alpha) {
    const { f, r } = parseSq(sq);
    const x = px(f), y = py(r), rad = GAP * 0.45;
    const red = letter === letter.toUpperCase();
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = "rgba(0,0,0,0.35)";
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    const g = ctx.createRadialGradient(x - rad * 0.3, y - rad * 0.3, rad * 0.2, x, y, rad);
    g.addColorStop(0, "#faf0da");
    g.addColorStop(1, "#e3cda3");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = "transparent";
    const col = red ? "#b03426" : "#33291c";
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, rad - 3.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = col;
    ctx.font = '700 27px "Kaiti SC", "STKaiti", "KaiTi", serif';
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(CHARS[letter], x, y + 1);
    ctx.restore();
  }

  function draw() {
    drawBoardBase();
    const grid = setupMode ? setupGrid : gridFromFen(board.fen());

    if (!setupMode && lastMove) {
      for (const s of [lastMove.from, lastMove.to]) {
        const { f, r } = parseSq(s);
        ctx.strokeStyle = "rgba(192, 57, 43, 0.85)";
        ctx.lineWidth = 2;
        ctx.strokeRect(px(f) - GAP * 0.42, py(r) - GAP * 0.42, GAP * 0.84, GAP * 0.84);
      }
    }
    for (const [sq, letter] of Object.entries(grid)) drawPiece(sq, letter, 1);

    if (!setupMode && selected) {
      const { f, r } = parseSq(selected);
      ctx.strokeStyle = "#2e7d4f";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(px(f), py(r), GAP * 0.48, 0, Math.PI * 2);
      ctx.stroke();
      for (const t of targets) {
        const q = parseSq(t);
        ctx.fillStyle = "rgba(46, 125, 79, 0.85)";
        if (grid[t]) {
          ctx.strokeStyle = "rgba(46, 125, 79, 0.9)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(px(q.f), py(q.r), GAP * 0.46, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(px(q.f), py(q.r), 6, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  // ---------- 对局流程 ----------
  function legalFrom(sq) {
    const re = /(^[a-i](?:10|[1-9]))([a-i](?:10|[1-9]))$/;
    return board.legalMoves().split(" ").filter(Boolean)
      .map(mv => re.exec(mv))
      .filter(m => m && m[1] === sq)
      .map(m => m[2]);
  }

  function updateMovelist() {
    if (sans.length === 0) { movelistEl.textContent = "—"; return; }
    let html = "";
    for (let i = 0; i < sans.length; i += 2) {
      html += `<b>${i / 2 + 1}.</b> ${sans[i]}${sans[i + 1] ? "  " + sans[i + 1] : ""}<br>`;
    }
    movelistEl.innerHTML = html;
    movelistEl.scrollTop = movelistEl.scrollHeight;
  }

  function pushMove(uci) {
    sans.push(board.sanMove(uci, Notation.XIANGQI_WXF));
    board.push(uci);
    moves.push(uci);
    const re = /^([a-i](?:10|[1-9]))([a-i](?:10|[1-9]))$/.exec(uci);
    lastMove = { from: re[1], to: re[2] };
    updateMovelist();
  }

  function checkGameEnd() {
    if (!board.isGameOver()) return false;
    gameOver = true;
    const result = board.result(); // "1-0" 红胜 / "0-1" 黑胜 / "1/2-1/2"
    let title, sub;
    if (result === "1/2-1/2") {
      title = "平局";
      sub = "双方握手言和。";
    } else {
      const redWon = result === "1-0";
      const humanWon = redWon === humanRed;
      title = humanWon ? "你赢了" : "引擎获胜";
      sub = humanWon ? "漂亮！你击败了 NNUE 引擎。" : "再接再厉，试试悔棋复盘或调低难度。";
    }
    endTitle = title;
    setStatus(title, false);
    overlayTitle.textContent = title;
    overlaySub.textContent = sub;
    setTimeout(() => overlay.classList.remove("hidden"), 500);
    return true;
  }

  function statusForHuman() {
    setStatus(board.isCheck() ? "将军！轮到你应将" : "轮到你落子", false);
  }

  function engineTurn() {
    thinking = true;
    selected = null; targets = [];
    undoBtn.disabled = true;
    setStatus("引擎思考中…", true);
    const lv = LEVELS[document.getElementById("level").value];
    sf.postMessage(`setoption name Skill Level value ${lv.skill}`);
    const pos = startFen ? "position fen " + startFen : "position startpos";
    sf.postMessage(pos + (moves.length ? " moves " + moves.join(" ") : ""));
    onBestmove = (mv) => {
      thinking = false;
      if (gameOver) return;
      pushMove(mv);
      const im = /depth (\d+) .*score (cp|mate) (-?\d+)/.exec(lastInfo);
      if (im) {
        const sc = im[2] === "mate" ? `杀棋 ${im[3]} 步` : `评分 ${im[3]}`;
        engineMsgEl.textContent = `深度 ${im[1]} · ${sc}（引擎视角）`;
      }
      draw();
      if (!checkGameEnd()) {
        statusForHuman();
        undoBtn.disabled = moves.length < 2;
      }
    };
    sf.postMessage(`go movetime ${lv.movetime}`);
  }

  function squareFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const scale = W / rect.width;
    const mx = (e.clientX - rect.left) * scale;
    const my = (e.clientY - rect.top) * scale;
    let f = Math.round((mx - MX) / GAP), ri = Math.round((my - MY) / GAP);
    if (f < 0 || f > 8 || ri < 0 || ri > 9) return null;
    if (Math.abs(MX + f * GAP - mx) > GAP * 0.45 || Math.abs(MY + ri * GAP - my) > GAP * 0.45) return null;
    if (flipped) { f = 8 - f; }
    const r = flipped ? ri + 1 : 10 - ri;
    return sqName(f, r);
  }

  canvas.addEventListener("click", (e) => {
    const sq = squareFromEvent(e);
    if (!sq) return;
    if (setupMode) { setupPlace(sq); return; }
    if (gameOver || thinking || !humanTurn()) return;

    if (selected && targets.includes(sq)) {
      pushMove(selected + sq);
      selected = null; targets = [];
      draw();
      if (!checkGameEnd()) engineTurn();
      return;
    }
    const grid = gridFromFen(board.fen());
    const letter = grid[sq];
    const mine = letter && (letter === letter.toUpperCase()) === humanRed;
    if (mine) {
      selected = sq;
      targets = legalFrom(sq);
    } else {
      selected = null; targets = [];
    }
    draw();
  });

  undoBtn.addEventListener("click", () => {
    if (gameOver || thinking || moves.length < 2) return;
    for (let i = 0; i < 2; i++) { board.pop(); moves.pop(); sans.pop(); }
    const re = moves.length
      ? /^([a-i](?:10|[1-9]))([a-i](?:10|[1-9]))$/.exec(moves[moves.length - 1]) : null;
    lastMove = re ? { from: re[1], to: re[2] } : null;
    selected = null; targets = [];
    undoBtn.disabled = moves.length < 2;
    updateMovelist();
    statusForHuman();
    draw();
  });

  function startGame() {
    if (thinking) { staleBestmoves++; sf.postMessage("stop"); } // 丢弃进行中的旧搜索
    onBestmove = null;
    board.delete();
    board = startFen ? new ffish.Board("xiangqi", startFen) : new ffish.Board("xiangqi");
    moves = []; sans = [];
    selected = null; targets = []; lastMove = null;
    gameOver = false; thinking = false;
    flipped = !humanRed;
    overlay.classList.add("hidden");
    undoBtn.disabled = true;
    updateMovelist();
    draw();
    if (checkGameEnd()) return; // 导入的局面可能本身已是终局
    if (!humanTurn()) engineTurn();
    else statusForHuman();
  }

  function restart() {
    humanRed = document.getElementById("side").value === "r";
    startGame();
  }

  // ---------- 导入局面 ----------
  const importOverlay = document.getElementById("importOverlay");
  const fenInput = document.getElementById("fenInput");
  const fenErr = document.getElementById("fenErr");

  document.getElementById("importBtn").addEventListener("click", () => {
    fenErr.textContent = "";
    fenInput.value = board.fen(); // 预填当前局面，便于修改或分享
    importOverlay.classList.remove("hidden");
    fenInput.focus();
    fenInput.select();
  });
  // 摆棋期间可能弃置过引擎搜索；回到对局时若轮引擎走且未在思考，则补上
  function resumeGame() {
    if (gameOver) { setStatus(endTitle || "对局结束", false); return; }
    if (!humanTurn()) { if (!thinking) engineTurn(); }
    else statusForHuman();
  }

  document.getElementById("importCancelBtn").addEventListener("click", () => {
    importOverlay.classList.add("hidden");
    resumeGame();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !importOverlay.classList.contains("hidden")) {
      importOverlay.classList.add("hidden");
      resumeGame();
    }
  });
  document.getElementById("resetStdBtn").addEventListener("click", () => {
    startFen = null;
    importOverlay.classList.add("hidden");
    restart();
  });
  document.getElementById("importOkBtn").addEventListener("click", () => {
    const fen = fenInput.value.trim().replace(/\s+/g, " ");
    if (!fen) { fenErr.textContent = "请粘贴 FEN 串。"; return; }
    if (ffish.validateFen(fen, "xiangqi") !== 1) {
      fenErr.textContent = "FEN 无效：请检查棋盘、子力与轮走方字段。";
      return;
    }
    const redToMove = fen.split(" ")[1] !== "b"; // 缺省视为红方走
    const humanFirst = document.getElementById("firstSel").value === "human";
    humanRed = humanFirst ? redToMove : !redToMove;
    document.getElementById("side").value = humanRed ? "r" : "b";
    startFen = fen;
    importOverlay.classList.add("hidden");
    startGame();
  });

  // ---------- 摆棋模式 ----------
  const playPanel = document.getElementById("playPanel");
  const setupPanel = document.getElementById("setupPanel");
  const setupErrEl = document.getElementById("setupErr");
  const START_BOARD = "rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR";
  const MAXN = { k: 1, a: 2, b: 2, n: 2, r: 2, c: 2, p: 5 };

  // 各兵种的合法站位（中国象棋规则下棋子可能到达的点）
  const PALACE_R = ["d1","e1","f1","d2","e2","f2","d3","e3","f3"];
  const PALACE_B = ["d8","e8","f8","d9","e9","f9","d10","e10","f10"];
  const ADV_R = ["d1","f1","e2","d3","f3"];
  const ADV_B = ["d10","f10","e9","d8","f8"];
  const ELE_R = ["c1","g1","a3","e3","i3","c5","g5"];
  const ELE_B = ["c10","g10","a8","e8","i8","c6","g6"];

  function buildPalette(el, letters) {
    for (const ch of letters) {
      const btn = document.createElement("button");
      btn.type = "button";
      if (ch === "x") { btn.textContent = "移除"; btn.className = "erase"; }
      else {
        btn.textContent = CHARS[ch];
        btn.className = ch === ch.toUpperCase() ? "rd" : "blk";
      }
      btn.dataset.piece = ch;
      btn.addEventListener("click", () => {
        setupSel = ch;
        document.querySelectorAll(".palette button").forEach(b =>
          b.classList.toggle("sel", b.dataset.piece === ch));
      });
      el.appendChild(btn);
    }
  }
  buildPalette(document.getElementById("paletteRed"), "KARNCBP");
  buildPalette(document.getElementById("paletteBlack"), "karncbpx");
  document.querySelector('.palette button[data-piece="K"]').classList.add("sel");

  function enterSetup() {
    if (thinking) { staleBestmoves++; sf.postMessage("stop"); onBestmove = null; thinking = false; }
    setupMode = true;
    setupGrid = {};  // 从空棋盘开始摆
    selected = null; targets = [];
    setupErrEl.textContent = "";
    playPanel.style.display = "none";
    setupPanel.style.display = "flex";
    setStatus("摆棋中", false);
    draw();
  }

  function exitSetup(resume) {
    setupMode = false;
    playPanel.style.display = "contents";
    setupPanel.style.display = "none";
    draw();
    if (resume) resumeGame();
  }

  function setupPlace(sq) {
    setupErrEl.textContent = "";
    if (setupSel === "x" || setupGrid[sq] === setupSel) { delete setupGrid[sq]; draw(); return; }
    const cap = MAXN[setupSel.toLowerCase()];
    const cnt = Object.values(setupGrid).filter(v => v === setupSel).length;
    if (cnt >= cap) { setupErrEl.textContent = `${CHARS[setupSel]} 最多 ${cap} 枚`; return; }
    setupGrid[sq] = setupSel;
    draw();
  }

  function setupBoardPart() {
    const rows = [];
    for (let r = 10; r >= 1; r--) {
      let row = "", gap = 0;
      for (let f = 0; f < 9; f++) {
        const ch = setupGrid[sqName(f, r)];
        if (ch) { if (gap) { row += gap; gap = 0; } row += ch; }
        else gap++;
      }
      if (gap) row += gap;
      rows.push(row);
    }
    return rows.join("/");
  }

  function validateSetup(turn) {
    const at = {};
    for (const [sq, ch] of Object.entries(setupGrid)) (at[ch] = at[ch] || []).push(sq);
    const within = (ch, set) => (at[ch] || []).every(s => set.includes(s));
    if ((at.K || []).length !== 1 || (at.k || []).length !== 1) return "需要红帥与黑將各一枚";
    if (!within("K", PALACE_R) || !within("k", PALACE_B)) return "将帅必须在各自九宫内";
    if (!within("A", ADV_R) || !within("a", ADV_B)) return "仕/士只能在九宫斜线交点上";
    if (!within("B", ELE_R) || !within("b", ELE_B)) return "相/象不能过河，且只能在田字位上";
    for (const s of at.P || []) {
      const { f, r } = parseSq(s);
      if (r < 4 || (r <= 5 && f % 2 !== 0)) return "红兵位置不合法：未过河只能在兵线交点";
    }
    for (const s of at.p || []) {
      const { f, r } = parseSq(s);
      if (r > 7 || (r >= 6 && f % 2 !== 0)) return "黑卒位置不合法：未过河只能在卒线交点";
    }
    const qK = parseSq(at.K[0]), qk = parseSq(at.k[0]);
    if (qK.f === qk.f) {
      let blocked = false;
      for (let r = qK.r + 1; r < qk.r; r++) if (setupGrid[sqName(qK.f, r)]) blocked = true;
      if (!blocked) return "将帅不可直接对脸";
    }
    // 非走子方不得正被将军：换边建盘探测
    const probe = new ffish.Board("xiangqi",
      setupBoardPart() + " " + (turn === "w" ? "b" : "w") + " - - 0 1");
    const oppInCheck = probe.isCheck();
    probe.delete();
    if (oppInCheck) return turn === "w"
      ? "黑方正被将军，不能轮红方走（可改黑先）"
      : "红方正被将军，不能轮黑方走（可改红先）";
    return null;
  }

  document.getElementById("setupBtn").addEventListener("click", enterSetup);
  document.getElementById("setupCancelBtn").addEventListener("click", () => exitSetup(true));
  document.getElementById("setupClearBtn").addEventListener("click", () => {
    setupGrid = {}; setupErrEl.textContent = ""; draw();
  });
  document.getElementById("setupInitBtn").addEventListener("click", () => {
    setupGrid = gridFromFen(START_BOARD); setupErrEl.textContent = ""; draw();
  });
  document.getElementById("setupDoneBtn").addEventListener("click", () => {
    const turn = document.getElementById("setupTurn").value;
    const err = validateSetup(turn);
    if (err) { setupErrEl.textContent = err; return; }
    const fen = setupBoardPart() + " " + turn + " - - 0 1";
    if (ffish.validateFen(fen, "xiangqi") !== 1) {
      setupErrEl.textContent = "局面未通过规则库校验";
      return;
    }
    exitSetup(false);
    fenErr.textContent = "";
    fenInput.value = fen;
    importOverlay.classList.remove("hidden");
  });

  document.getElementById("restartBtn").addEventListener("click", restart);
  document.getElementById("againBtn").addEventListener("click", restart);
  document.getElementById("side").addEventListener("change", restart);

  engineNameEl.textContent = "Fairy-Stockfish WASM · NNUE";
  restart();
})();
</script>
</body>
</html>
